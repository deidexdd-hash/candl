services:
  - type: web
    name: yazyk-plameni-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd apps/backend && npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: cd apps/backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yazyk-plameni-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TMA_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
 
  - type: web
    name: yazyk-plameni-frontend
    env: static
    buildCommand: cd apps/frontend && npm install && npm run build
    staticPublishPath: apps/frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
 
databases:
  - name: yazyk-plameni-db
    plan: free
    databaseName: yazyk_plameni
    region: frankfurt

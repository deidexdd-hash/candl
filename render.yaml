services:
  - type: web
    name: yazyk-plameni-api
    env: node
    region: frankfurt
    plan: starter          # $7/мес — always-on, без засыпания
    buildCommand: cd apps/backend && npm install && npx prisma generate && npm run build
    startCommand: cd apps/backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yazyk-plameni-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: yazyk-plameni-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false        # вводить вручную в Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: TMA_URL
        sync: false        # https://t.me/YourBot/app
      - key: NODE_ENV
        value: production

  - type: web
    name: yazyk-plameni-frontend
    env: static
    region: frankfurt
    buildCommand: cd apps/frontend && npm install && npm run build
    staticPublishPath: apps/frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: yazyk-plameni-db
    plan: free             # Бесплатно первые 90 дней → $7/мес
    databaseName: yazyk_plameni
    region: frankfurt

  - name: yazyk-plameni-redis
    type: redis
    plan: starter          # $10/мес
    region: frankfurt

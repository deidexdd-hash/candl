<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0a06" />
    <title>Язык Пламени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--tg-theme-bg-color, #fff);
        color: var(--tg-theme-text-color, #000);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root { height: 100dvh; overflow: hidden; }

      /* ── SPLASH ─────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0d0a06;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Ambient glow behind the candle */
      .splash-glow {
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(255,140,30,0.18) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -62%);
        animation: glowPulse 3s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.7; transform: translate(-50%, -62%) scale(1); }
        50%       { opacity: 1;   transform: translate(-50%, -62%) scale(1.12); }
      }

      /* Candle SVG wrapper */
      .splash-candle {
        position: relative;
        z-index: 2;
        width: 90px;
        margin-bottom: 28px;
      }

      /* Flame */
      .flame-wrap {
        position: relative;
        width: 36px;
        height: 52px;
        margin: 0 auto 0;
      }
      .flame {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform-origin: bottom center;
      }
      /* Outer flame */
      .flame-outer {
        width: 30px;
        height: 48px;
        background: linear-gradient(to top, #ff8c00 0%, #ffd040 45%, #fff8e1 100%);
        border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
        transform: translateX(-50%);
        animation: flameOuter 2.1s ease-in-out infinite;
        box-shadow: 0 0 18px 6px rgba(255,160,20,0.45);
      }
      /* Inner flame (brighter core) */
      .flame-inner {
        width: 14px;
        height: 26px;
        background: linear-gradient(to top, #ffe066 0%, #fffde7 100%);
        border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
        transform: translateX(-50%);
        bottom: 4px;
        animation: flameInner 1.7s ease-in-out infinite;
        opacity: 0.9;
      }
      @keyframes flameOuter {
        0%, 100% { transform: translateX(-50%) scaleX(1)   skewX(0deg)  scaleY(1); }
        25%       { transform: translateX(-52%) scaleX(0.93) skewX(-4deg) scaleY(1.04); }
        50%       { transform: translateX(-50%) scaleX(1.05) skewX(2deg)  scaleY(0.97); }
        75%       { transform: translateX(-48%) scaleX(0.95) skewX(3deg)  scaleY(1.02); }
      }
      @keyframes flameInner {
        0%, 100% { transform: translateX(-50%) scaleX(1)   scaleY(1); }
        33%       { transform: translateX(-52%) scaleX(0.88) scaleY(1.06); }
        66%       { transform: translateX(-48%) scaleX(1.1)  scaleY(0.95); }
      }

      /* Wick */
      .wick {
        width: 2px;
        height: 10px;
        background: #3a2a10;
        margin: 0 auto;
        border-radius: 1px;
      }

      /* Candle body */
      .candle-body {
        width: 54px;
        height: 110px;
        background: linear-gradient(135deg, #f5e6c8 0%, #e8c97a 40%, #d4a84b 100%);
        border-radius: 4px 4px 2px 2px;
        margin: 0 auto;
        position: relative;
        box-shadow: inset -6px 0 12px rgba(0,0,0,0.18), 2px 4px 16px rgba(0,0,0,0.35);
      }
      /* Wax drip */
      .candle-body::before {
        content: '';
        position: absolute;
        top: -6px;
        left: 6px;
        width: 18px;
        height: 12px;
        background: #f0dba0;
        border-radius: 0 0 50% 50%;
        box-shadow: 22px 2px 0 -2px #e8c97a;
      }
      /* Candle shine */
      .candle-body::after {
        content: '';
        position: absolute;
        top: 8px;
        left: 8px;
        width: 6px;
        height: 55px;
        background: rgba(255,255,255,0.22);
        border-radius: 3px;
      }

      /* Smoke particles */
      .smoke {
        position: absolute;
        bottom: calc(100% + 46px);
        left: 50%;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
        filter: blur(3px);
        animation: smokeRise 3s ease-out infinite;
        opacity: 0;
      }
      .smoke:nth-child(1) { animation-delay: 0s;    left: 48%; }
      .smoke:nth-child(2) { animation-delay: 1.1s;  left: 52%; width: 4px; height: 4px; }
      .smoke:nth-child(3) { animation-delay: 2.2s;  left: 50%; width: 3px; height: 3px; }
      @keyframes smokeRise {
        0%   { opacity: 0;   transform: translateX(-50%) translateY(0)   scale(1); }
        20%  { opacity: 0.6; }
        100% { opacity: 0;   transform: translateX(-50%) translateY(-45px) scale(3); }
      }

      /* Sparks / ember dots */
      .sparks {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 50%;
        pointer-events: none;
      }
      .spark {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #ffd060;
        animation: sparkFly 2.4s ease-out infinite;
        opacity: 0;
      }
      .spark:nth-child(1) { animation-delay: 0.3s; }
      .spark:nth-child(2) { animation-delay: 1.2s; }
      .spark:nth-child(3) { animation-delay: 2.0s; }
      @keyframes sparkFly {
        0%   { opacity: 1; transform: translate(-4px, 0) scale(1); }
        50%  { opacity: 0.7; }
        100% { opacity: 0; transform: translate(10px, -22px) scale(0.3); }
      }

      /* Title */
      .splash-title {
        position: relative;
        z-index: 2;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #f5dfa0;
        text-align: center;
        text-shadow: 0 0 28px rgba(255,160,20,0.6), 0 0 60px rgba(255,120,0,0.3);
        animation: titleGlow 3s ease-in-out infinite;
      }
      @keyframes titleGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(255,160,20,0.5), 0 0 50px rgba(255,100,0,0.2); }
        50%       { text-shadow: 0 0 36px rgba(255,180,40,0.9), 0 0 80px rgba(255,140,0,0.5); }
      }

      /* Loading dots */
      .splash-dots {
        margin-top: 18px;
        display: flex;
        gap: 8px;
        position: relative;
        z-index: 2;
      }
      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(245,223,160,0.4);
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .splash-dot:nth-child(1) { animation-delay: 0s; }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotPulse {
        0%, 80%, 100% { background: rgba(245,223,160,0.25); transform: scale(1); }
        40%            { background: rgba(245,223,160,0.9);  transform: scale(1.4); }
      }

      /* Floor reflection */
      .splash-reflection {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 140px;
        background: linear-gradient(to bottom, transparent, rgba(255,120,20,0.04) 60%, rgba(255,100,10,0.08));
        pointer-events: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>

    <!-- ── Splash screen ─────────────────────────────── -->
    <div id="splash">
      <div class="splash-glow"></div>

      <div class="splash-candle">
        <!-- Smoke -->
        <div style="position:relative; height:0">
          <div class="smoke"></div>
          <div class="smoke"></div>
          <div class="smoke"></div>
        </div>

        <!-- Flame -->
        <div class="flame-wrap">
          <div class="sparks">
            <div class="spark"></div>
            <div class="spark"></div>
            <div class="spark"></div>
          </div>
          <div class="flame flame-outer"></div>
          <div class="flame flame-inner"></div>
        </div>

        <!-- Wick -->
        <div class="wick"></div>

        <!-- Body -->
        <div class="candle-body"></div>
      </div>

      <div class="splash-title">Язык Пламени</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>

      <div class="splash-reflection"></div>
    </div>
    <!-- ──────────────────────────────────────────────── -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
